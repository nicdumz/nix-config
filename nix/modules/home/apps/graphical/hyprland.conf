# preferred res, auto position, scaling
monitor=,highres,auto,1.25

$ipc = noctalia-shell ipc call

xwayland {
  force_zero_scaling = true
}

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

input {
    kb_options = caps:super
    follow_mouse = 1
}

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    # top,right,bottom,left
    gaps_out = 10,15,15,15

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors

    # Catppuccin mocha Colors
    # blue to green
    col.active_border = rgba(89b4faee) rgba(a6e3a1ee) 45deg
    # lavender
    col.inactive_border = rgba(b4befeaa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 8
        render_power = 3
        color = rgba(313244ee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    # animation = workspaces,    1,     1.94,  almostLinear, fade
    # animation = workspacesIn,  1,     1.21,  almostLinear, fade
    # animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick

    # Thanks Gemini
    # bezier = smoothIn, 0.25, 1, 0.5, 1
    # bezier = overshot, 0.05, 0.9, 0.1, 1.05
    # bezier = deccel, 0.05, 0.9, 0.1, 1
    # bezier = md3_decel, 0.05, 0.7, 0.1, 1
    # bezier = easeOutExpo, 0.16, 1, 0.3, 1
    # animation = workspaces, 1, 3, smoothIn, slide
    # animation = workspaces, 1, 5, easeOutExpo, slide
    # animation = workspaces, 1, 5, easeOutExpo, slidevert
    # Speed 2 makes it almost instantaneous (approx 100-150ms)
    # This removes the 'travel' time that causes eye tracking strain
    animation = workspaces, 1, 2, default, slide
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    # force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}

layerrule = ignorezero, rofi
layerrule = ignorezero, rofi-theme-selector
# Prevents the wallpaper/background layer from flickering during workspace changes
layerrule = noanim, selection
layerrule = noanim, overview
layerrule = noanim, anylayer

bind = SUPER, C, killactive,
bind = SUPER, Return, exec, kitty
bind = SUPER, R, exec, rofi -show drun
bind = SUPER, F, fullscreen, 0
bind = SUPER, V, fullscreen, 1
bind = SUPER, left, workspace, -1
bind = SUPER, right, workspace, +1

bind = SUPER, j, movefocus, u
bind = SUPER, k, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
# bind = SUPER, S, togglespecialworkspace, magic

# Scroll through existing workspaces with mainMod + scroll
bind = SUPER, mouse_down, workspace, -1
bind = SUPER, mouse_up, workspace,+1
bind = SUPER SHIFT, mouse_down, movetoworkspacesilent, -1
bind = SUPER SHIFT, mouse_up, movetoworkspacesilent, +1

bind = SUPER, TAB, focusurgentorlast
bind = SUPER, S, togglespecialworkspace
bind = SUPER SHIFT, S, movetoworkspace, special

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Core binds
bind = SUPER, SPACE, exec, $ipc launcher toggle
bind = SUPER, S, exec, $ipc controlCenter toggle
bind = SUPER, comma, exec, $ipc settings toggle

# Media keys
bindel = , XF86AudioRaiseVolume, exec, $ipc volume increase
bindel = , XF86AudioLowerVolume, exec, $ipc volume decrease
bindl = , XF86AudioMute, exec, $ipc volume muteOutput
bindel = , XF86MonBrightnessUp, exec, $ipc brightness increase
bindel = , XF86MonBrightnessDown, exec, $ipc brightness decrease


# There's a different lock depending on the environment; hyprlock is sexier
bind = SUPER, L, exec, hyprlock
# Following services are started differently, nix, generally handles them system wide:
# - hypridle on nix, swayidle on glinux
# - nm-applet on both
# - swaync on nix vs mako on glinux

# this will break, it's ok
source = ~/.config/hypr/dynamic.conf

windowrulev2 = float, pin, size 900 700, move 100%-920 100%-720, class:^(google-chrome)$, initialTitle:^Meet - .*
# Catppuccin Mocha: Red (f38ba8) to Peach (fab387) gradient for remote SSH connections in kitty
windowrulev2 = bordercolor rgb(f38ba8) rgb(fab387) 45deg, class:^(kitty)$, title:(^.*\[.*\].*)
